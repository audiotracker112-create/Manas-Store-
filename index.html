<!DOCTYPE html>
<html>
<head>
<title>Manas Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:black;
color:white;
padding:20px;
text-align:center;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:green;
color:white;
border:none;
padding:10px;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}

</style>

</head>

<body>

<header>
<h1>Manas Store</h1>
<p>Electronics & Gadgets</p>
</header>

<div class="products">

<div class="product">
<h3>Wireless Earbuds</h3>
<p>₹1499</p>
<button>Add to Cart</button>
</div>

<div class="product">
<h3>Smart Watch</h3>
<p>₹2999</p>
<button>Add to Cart</button>
</div>

<div class="product">
<h3>Bluetooth Speaker</h3>
<p>₹1999</p>
<button>Add to Cart</button>
</div>

<div class="product">
<h3>Power Bank</h3>
<p>₹999</p>
<button>Add to Cart</button>
</div>

</div>

</body>
